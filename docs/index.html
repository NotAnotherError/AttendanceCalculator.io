<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Calculator</title>
    <style>
        /* Set the color scheme */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
        }

        .form-control {
            background-color: #2d2d2d;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 10px;
            width: 100%;
        }

        .btn {
            background-color: #2196F3;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .result-container {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #333333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Attendance Calculator</h1>

        <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-calculator1-tab" data-bs-toggle="pill"
                    data-bs-target="#pills-calculator1" type="button" role="tab" aria-controls="pills-calculator1"
                    aria-selected="true">Calculator 1</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pills-calculator2-tab" data-bs-toggle="pill"
                    data-bs-target="#pills-calculator2" type="button" role="tab" aria-controls="pills-calculator2"
                    aria-selected="false">Calculator 2</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-calculator1" role="tabpanel"
                aria-labelledby="pills-calculator1-tab">
                <form onsubmit="event.preventDefault(); calculateHoursToMakeup();">
                    <div class="form-group">
                        <label for="total_hours_possible1">How many hours are possible in the course?</label>
                        <input type="text" class="form-control" id="total_hours_possible1" name="total_hours_possible1"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="percent_goal1">What is your goal percentage for attendance?</label>
                        <input type="text" class="form-control" id="percent_goal1" name="percent_goal1" required>
                    </div>
                    <div class="form-group">
                        <label for="hours_absent1">How many hours were you absent?</label>
                        <input type="text" class="form-control" id="hours_absent1" name="hours_absent1" required>
                    </div>
                    <div class="form-group">
                        <label for="hours_makeup1">How many hours have you officially made up?</label>
                        <input type="text" class="form-control" id="hours_makeup1" name="hours_makeup1" required>
                    </div>
                    <div class="form-group">
                        <label for="uo_minutes1">Have you made up any hours unofficially? (in minutes)</label>
                        <input type="text" class="form-control" id="uo_minutes1" name="uo_minutes1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Calculate</button>
                </form>
                <div id="result1" class="result-container"></div>
            </div>

            <div class="tab-pane fade" id="pills-calculator2" role="tabpanel" aria-labelledby="pills-calculator2-tab">
                <form onsubmit="event.preventDefault(); calculateHoursNeeded();">
                    <div class="form-group">
                        <label for="total_hours2">Total Possible Hours:</label>
                        <input type="text" class="form-control" id="total_hours2" name="total_hours2" required>
                    </div>
                    <div class="form-group">
                        <label for="current_percent2">Current Attendance Percentage:</label>
                        <input type="text" class="form-control" id="current_percent2" name="current_percent2" required>
                    </div>
                    <div class="form-group">
                        <label for="goal_percent2">Goal Attendance Percentage:</label>
                        <input type="text" class="form-control" id="goal_percent2" name="goal_percent2" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Calculate</button>
                </form>
                <div id="result2" class="result-container"></div>
            </div>
        </div>

        <script>
            function calculateHoursToMakeup() {
                var totalHoursPossibleInput = document.getElementById('total_hours_possible1');
                var percentGoalInput = document.getElementById('percent_goal1');
                var hoursAbsentInput = document.getElementById('hours_absent1');
                var hoursMakeupInput = document.getElementById('hours_makeup1');
                var uoMinutesInput = document.getElementById('uo_minutes1');

                var totalHoursPossible = parseFloat(totalHoursPossibleInput.value);
                var percentGoal = parseFloat(percentGoalInput.value);
                var hoursAbsent = parseFloat(hoursAbsentInput.value);
                var hoursMakeup = parseFloat(hoursMakeupInput.value);
                var uoMinutes = parseFloat(uoMinutesInput.value);

                var uoHours = uoMinutes / 60;
                var totalHoursMissed = hoursAbsent - hoursMakeup;
                var percentDecimal = percentGoal / 100;
                var uoTotal = totalHoursMissed - uoHours;
                var currentHours = totalHoursPossible - totalHoursMissed;
                var currentDecimal = currentHours / totalHoursPossible;
                var currentPercent = currentDecimal * 100;
                var possibleAbsentHours = totalHoursPossible * percentDecimal;
                var maxAbsentHours = totalHoursPossible - possibleAbsentHours;
                var hoursNeeded = totalHoursMissed - maxAbsentHours - uoHours;
                var time = hoursNeeded;
                var hours = Math.floor(time);
                var minutes = Math.floor((time * 60) % 60);
                var rounded = hoursNeeded.toFixed(2);
                var percentRounded = currentPercent.toFixed(2);

                var resultText = '';
                if (currentPercent < percentGoal) {
                    if (hoursNeeded <= 0) {
                        resultText = 'You have already reached your attendance goal.';
                    } else {
                        resultText =
                            'To reach your attendance goal of ' +
                            percentGoal +
                            '%, you need to make up ' +
                            hours +
                            ' hour(s) and ' +
                            minutes +
                            ' minute(s) of missed time.';
                    }
                } else {
                    resultText =
                        'Your current attendance percentage is ' +
                        percentRounded +
                        '%, which meets or exceeds your goal of ' +
                        percentGoal +
                        '%.';
                }

                document.getElementById('result1').textContent = resultText;
            }

            function calculateHoursNeeded() {
                var totalHoursInput = document.getElementById('total_hours2');
                var currentPercentInput = document.getElementById('current_percent2');
                var goalPercentInput = document.getElementById('goal_percent2');

                var totalHours = parseFloat(totalHoursInput.value);
                var currentPercent = parseFloat(currentPercentInput.value);
                var goalPercent = parseFloat(goalPercentInput.value);

                var currentDecimal = currentPercent / 100;
                var goalDecimal = goalPercent / 100;

                var currentHours = totalHours * currentDecimal;
                var goalHours = totalHours * goalDecimal;
                var hoursNeeded = goalHours - currentHours;
                var time = hoursNeeded;
                var hours = Math.floor(time);
                var minutes = Math.floor((time * 60) % 60);
                var rounded = hoursNeeded.toFixed(2);

                var resultText =
                    'To reach your goal of ' +
                    goalPercent +
                    '%, you need to attend ' +
                    hours +
                    ' hour(s) and ' +
                    minutes +
                    ' minute(s) of class time.';

                document.getElementById('result2').textContent = resultText;
            }
        </script>
    </div>
</body>

</html>
