<!DOCTYPE html>
<html>

<head>
    <title>Attendance Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        /* Set the color scheme */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #1E90FF;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"] {
            padding: 5px;
            border: none;
            border-radius: 3px;
            background-color: #2d2d2d;
            color: #ffffff;
            width: 100%;
        }

        .btn {
            padding: 8px 15px;
            background-color: #1E90FF;
            color: #ffffff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0077FF;
        }

        .result-container {
            margin-top: 10px;
            padding: 10px;
            background-color: #333333;
            border-radius: 3px;
        }

        .result-container p {
            margin: 0;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <h1>Attendance Calculator</h1>

    <!-- First Calculator: Hours to Make Up -->
    <div id="calculator1" class="container">
        <h2 class="text-center">Hours to Make Up</h2>

        <div class="row mb-3">
            <div class="col">
                <label for="total_hours_possible1" class="form-label">Total Possible Hours:</label>
                <input type="number" id="total_hours_possible1" class="form-control">
            </div>
            <div class="col">
                <label for="percent_goal1" class="form-label">Goal Percentage for Attendance:</label>
                <input type="number" id="percent_goal1" class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label for="hours_absent1" class="form-label">Hours Absent:</label>
                <input type="number" id="hours_absent1" class="form-control">
            </div>
            <div class="col">
                <label for="hours_makeup1" class="form-label">Hours Made Up:</label>
                <input type="number" id="hours_makeup1" class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label for="uo_minutes1" class="form-label">Unofficially Made Up Hours (in minutes):</label>
                <input type="number" id="uo_minutes1" class="form-control">
            </div>
        </div>

        <div class="text-center">
            <button class="btn btn-primary" onclick="calculateHoursToMakeup()">Calculate</button>
        </div>

        <div id="result1" class="result-container mt-3"></div>
    </div>

    <!-- Second Calculator: Hours Needed -->
    <div id="calculator2" class="container">
        <h2 class="text-center">Hours Needed</h2>

        <div class="row mb-3">
            <div class="col">
                <label for="total_hours_possible2" class="form-label">Total Possible Hours:</label>
                <input type="number" id="total_hours_possible2" class="form-control">
            </div>
            <div class="col">
                <label for="current_percent2" class="form-label">Current Attendance Percentage:</label>
                <input type="number" id="current_percent2" class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label for="goal_percent2" class="form-label">Goal Attendance Percentage:</label>
                <input type="number" id="goal_percent2" class="form-control">
            </div>
        </div>

        <div class="text-center">
            <button class="btn btn-primary" onclick="calculateHoursNeeded()">Calculate</button>
        </div>

        <div id="result2" class="result-container mt-3"></div>
    </div>

    <script>
        function calculateHoursToMakeup() {
            var totalHoursPossible = parseFloat(document.getElementById("total_hours_possible1").value);
            var percentGoal = parseFloat(document.getElementById("percent_goal1").value);
            var hoursAbsent = parseFloat(document.getElementById("hours_absent1").value);
            var hoursMakeup = parseFloat(document.getElementById("hours_makeup1").value);
            var uoMinutes = parseFloat(document.getElementById("uo_minutes1").value);

            var uoHours = uoMinutes / 60;
            var totalHoursMissed = hoursAbsent - hoursMakeup;
            var percentDecimal = percentGoal / 100;
            var uoTotal = totalHoursMissed - uoHours;
            var currentHours = totalHoursPossible - totalHoursMissed;
            var currentDecimal = currentHours / totalHoursPossible;
            var currentPercent = currentDecimal * 100;
            var possibleAbsentHours = totalHoursPossible * percentDecimal;
            var maxAbsentHours = totalHoursPossible - possibleAbsentHours;
            var hoursNeeded = totalHoursMissed - maxAbsentHours - uoHours;
            var time = hoursNeeded;
            var hours = Math.floor(time);
            var minutes = Math.floor((time * 60) % 60);
            var rounded = hoursNeeded.toFixed(2);
            var percentRounded = currentPercent.toFixed(2);

            var resultText = '';

            if (currentPercent < percentGoal) {
                if (hoursNeeded >= 0 || minutes >= 0) {
                    resultText = "You need to make up " + hours + " hours " + minutes + " minutes to reach your goal.";
                } else {
                    resultText = "Congratulations! You have exceeded your goal with a current percentage of " + percentRounded + "%.";
                }
            } else {
                resultText = "Congratulations! You have exceeded your goal with a current percentage of " + percentRounded + "%.";
            }

            var resultContainer = document.getElementById("result1");
            resultContainer.innerHTML = "<p>" + resultText + "</p>";
        }

        function calculateHoursNeeded() {
            var totalPossibleHours = parseFloat(document.getElementById("total_hours_possible2").value);
            var currentPercent = parseFloat(document.getElementById("current_percent2").value);
            var goalPercent = parseFloat(document.getElementById("goal_percent2").value);

            var currentDecimal = currentPercent / 100;
            var goalDecimal = goalPercent / 100;
            var decimalDiff = goalDecimal - currentDecimal;
            var hoursNeeded = decimalDiff * totalPossibleHours;
            var time = hoursNeeded;
            var hours = Math.floor(time);
            var minutes = Math.floor((time * 60) % 60);
            var rounded = hoursNeeded.toFixed(2);

            var resultText = "You need to accumulate " + hours + " hours " + minutes + " minutes to reach your goal.";

            var resultContainer = document.getElementById("result2");
            resultContainer.innerHTML = "<p>" + resultText + "</p>";
        }
    </script>
</body>

</html>
